{% extends "wagtailsnippets/snippets/index.html" %}
{% load i18n %}

{% block extra_actions %}
  {{ block.super }}
  <form method="post" action="{% url 'sync_team' %}" style="display:inline-block;">
    {% csrf_token %}
    <button type="submit" class="button button-secondary" style="display:inline-flex;align-items:center;gap:0.4rem;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <polyline points="23 20 23 14 17 14"></polyline>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
      </svg>
      {% trans "Sync from VaultRE" %}
    </button>
  </form>
{% endblock %}
