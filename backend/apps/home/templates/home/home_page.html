<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title|default:"Home" }}</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f8fa;
      color: #0f172a;
      line-height: 1.5;
    }
    .wrap {
      max-width: 760px;
      margin: 56px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 14px;
      color: #334155;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    a {
      display: inline-block;
      text-decoration: none;
      border: 1px solid #cbd5e1;
      padding: 10px 14px;
      border-radius: 10px;
      color: #0f172a;
      background: #f8fafc;
      font-weight: 600;
      font-size: 14px;
    }
    a:hover {
      background: #eef2ff;
    }
    code {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{ page.title|default:"Real Gold Properties" }}</h1>
      <p>
        Wagtail backend is running. This placeholder template prevents
        <code>TemplateDoesNotExist: home/home_page.html</code> on <code>/</code>.
      </p>
      <p>
        For the React frontend, run the Vite app separately.
      </p>
      <div class="links">
        <a href="/cms/">Open Wagtail CMS</a>
        <a href="/api/pages/home/">Home API</a>
        <a href="/api/properties/">Properties API</a>
      </div>
    </div>
  </div>
</body>
</html>
