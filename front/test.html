<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Service Cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px;
    }

    .service-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      text-decoration: none;
      background: #fff;
      border-radius: 18px;
      padding: 22px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: 0.3s ease;
      color: #111827;
      position: relative;
      overflow: hidden;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
    }

    .buy::before {
      background: #2563eb;
    }

    .sell::before {
      background: #16a34a;
    }

    .rent::before {
      background: #ea580c;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .buy .icon {
      background: rgba(37, 99, 235, 0.12);
      color: #2563eb;
    }

    .sell .icon {
      background: rgba(22, 163, 74, 0.12);
      color: #16a34a;
    }

    .rent .icon {
      background: rgba(234, 88, 12, 0.12);
      color: #ea580c;
    }

    h3 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .cta {
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #111827;
      transition: 0.3s ease;
    }

    .card:hover .cta {
      gap: 12px;
    }

    @media (max-width: 768px) {
      .service-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="service-cards">
    
    <a href="#" class="card buy">
      <div>
        <div class="icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M3 10.5L12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
          </svg>
        </div>
        <h3>Buy</h3>
        <p>Find your next home.</p>
      </div>
      <span class="cta">Explore →</span>
    </a>

    <a href="#" class="card sell">
      <div>
        <div class="icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M20 12V7a2 2 0 0 0-2-2h-5"></path>
            <path d="M14 3l-4 4 4 4"></path>
            <path d="M4 12v5a2 2 0 0 0 2 2h5"></path>
            <path d="M10 21l4-4-4-4"></path>
          </svg>
        </div>
        <h3>Sell</h3>
        <p>Get the best value fast.</p>
      </div>
      <span class="cta">List Now →</span>
    </a>

    <a href="#" class="card rent">
      <div>
        <div class="icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="8" cy="15" r="4"></circle>
            <path d="M10.85 12.15L19 4"></path>
            <path d="M18 3h3v3"></path>
          </svg>
        </div>
        <h3>Rent</h3>
        <p>Move in without the wait.</p>
      </div>
      <span class="cta">View Homes →</span>
    </a>

  </div>

</body>
</html>
